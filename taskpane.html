<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wrike ID Validator</title>
  <!-- Office.js MUST load before any script that uses Office -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #fff;
      padding: 16px;
      font-size: 13px;
      color: #201f1e;
    }
    .banner {
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 12px;
      border-left: 4px solid #c50f1f;
      background: #fde7e9;
    }
    .banner.ok {
      border-left-color: #107c10;
      background: #dff6dd;
    }
    .banner-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .banner-text { font-size: 12px; line-height: 1.5; color: #3b3a39; }
    .format {
      background: #f3f2f1;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      color: #605e5c;
      margin-bottom: 12px;
    }
    .format strong { color: #201f1e; display: block; margin-bottom: 4px; }
    code {
      background: #fff;
      border: 1px solid #edebe9;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: Consolas, monospace;
      color: #0078d4;
    }
    .btn {
      width: 100%;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 7px 0;
      font-size: 12px;
      cursor: pointer;
    }
    .btn:hover { background: #005a9e; }
  </style>
</head>
<body>

  <div id="banner" class="banner">
    <div class="banner-title">⏳ Checking…</div>
    <div class="banner-text">Please wait.</div>
  </div>

  <div class="format">
    <strong>Required format:</strong>
    Add the Wrike ID at the end of the subject:<br><br>
    ✅ <code>Your subject Wrike ID [1234]</code>
  </div>

  <button class="btn" onclick="refresh()">↻ Refresh</button>

  <script>
    var WATCHED_EMAILS = [
      "panama@odyssey.limited",
      "gravity@odyssey.limited"
    ];

    // Wait for Office.js to be ready before doing anything
    Office.onReady(function () {
      refresh();
    });

    function refresh() {
      var item = Office.context.mailbox.item;

      item.from.getAsync(function (fromResult) {
        var fromEmail = "";
        if (fromResult.status === Office.AsyncResultStatus.Succeeded) {
          fromEmail = (fromResult.value.emailAddress || "").toLowerCase().trim();
        }

        var isWatched = WATCHED_EMAILS.some(function (a) {
          return fromEmail === a.toLowerCase().trim();
        });

        item.subject.getAsync(function (subResult) {
          var subject = (subResult.status === Office.AsyncResultStatus.Succeeded)
            ? subResult.value || ""
            : "";

          if (!isWatched) {
            setBanner(true, "✅ No validation needed", "This mailbox is not required to include a Wrike ID.");
            return;
          }

          var match = subject.match(/\[\d+\]/);
          if (match) {
            setbanner(true, "✅ Wrike ID found: " + match[0], "Your subject is valid. You can send.");
          } else {
            setbanner(false, "❌ Wrike ID missing", "Please add the Wrike ID at the end of your subject: Wrike ID [1234]");
          }
        });
      });
    }

    function setbanner(ok, title, text) {
      var el = document.getElementById("banner");
      el.className = "banner" + (ok ? " ok" : "");
      el.innerHTML = '<div class="banner-title">' + title + '</div><div class="banner-text">' + text + '</div>';
    }

    // alias capitalisation fix
    function setBanner(ok, title, text) { setbanner(ok, title, text); }
  </script>
</body>
</html>
